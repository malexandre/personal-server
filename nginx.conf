# NOTE: `daemon off;` is intentionally NOT set here — the `web` service starts
# Nginx with `nginx -g "daemon off;"`, and setting it in both places is a
# duplicate-directive error.

events {}

http {
    include mime.types;

    # --- TLS defaults (inherited by every `listen 443 ssl` block) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- HTTP :80 — ACME challenge + redirect everything to HTTPS ---
    # Serves Let's Encrypt HTTP-01 challenges from the shared webroot and sends
    # all other traffic to HTTPS. Covers every domain we host.
    server {
        listen 80 default_server;
        server_name malexandre.fr www.malexandre.fr sfbdb.com www.sfbdb.com brewer.malexandre.fr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- blog — malexandre.fr (default HTTPS vhost) ---
    server {
        listen 443 ssl default_server;
        server_name malexandre.fr www.malexandre.fr;

        ssl_certificate     /etc/letsencrypt/live/malexandre.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/malexandre.fr/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root /usr/share/nginx/www/blog;
        index index.html;

        location /mbp15 {
            alias /usr/share/nginx/www/staticfiles;
            index mbp15.html;
        }

        location / {
            try_files /post/$uri $uri $uri/ =404;
        }

        error_page 404 /404.html;
    }

    # --- sfbdb — sfbdb.com ---
    server {
        listen 443 ssl;
        server_name sfbdb.com www.sfbdb.com;

        ssl_certificate     /etc/letsencrypt/live/sfbdb.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sfbdb.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root /usr/share/nginx/www/sfbdb;

        location /static/ {
            autoindex on;
        }

        location / {
            try_files /$uri /index.html =404;
        }

        error_page 404 /404.html;
    }

    # --- TeamBrewer — brewer.malexandre.fr ---
    # Reverse-proxies the whole subdomain to TeamBrewer's own Nginx, which serves
    # the SPA and proxies /api to the API. We must pass `X-Forwarded-Proto https`
    # so Better Auth issues secure cookies. Security headers (CSP, X-Frame-Options,
    # …) are set by TeamBrewer's own Nginx and intentionally not duplicated here.
    server {
        listen 443 ssl;
        server_name brewer.malexandre.fr;

        ssl_certificate     /etc/letsencrypt/live/malexandre.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/malexandre.fr/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Docker's embedded DNS. Resolving the upstream through a variable defers
        # name resolution to request time, so this container starts even when the
        # TeamBrewer stack is down or not yet built (e.g. during cert bootstrap,
        # when only `web` is up) — it returns 502 until the backend is ready
        # instead of refusing to start.
        resolver 127.0.0.11 valid=30s ipv6=off;

        location / {
            set $teambrewer_upstream teambrewer-web;
            proxy_pass         http://$teambrewer_upstream:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
